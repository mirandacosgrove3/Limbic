<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Limbic Pocket</title>
    <meta name="theme-color" content="#5b1f28" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Limbic Pocket" />
    <meta
      name="description"
      content="ChordButter-inspired songwriting workspace for chords, melody, lyrics, and quick song sketches."
    />
    <link rel="manifest" href="./manifest.webmanifest?v=20260314bb" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png?v=20260314bb" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=20260314bb" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png?v=20260314bb" />
    <link rel="stylesheet" href="./styles.css?v=20260314bb" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div class="app-shell-inner">
        <header class="top-shell">
          <div class="brand-row">
            <div class="brand-copy">
              <h1 class="app-title">Limbic Pocket</h1>
            </div>
            <div class="header-actions">
              <button class="mini-button icon-button" data-workspace-mode="export" aria-label="Export" title="Export">
                <span class="button-icon" aria-hidden="true">
                  <svg viewBox="0 0 20 20" focusable="false">
                    <path
                      d="M6 2.75H11L14.75 6.5V15.75C14.75 16.44 14.19 17 13.5 17H6.5C5.81 17 5.25 16.44 5.25 15.75V4C5.25 3.31 5.81 2.75 6.5 2.75Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.6"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M10.75 2.75V6.5H14.5"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.6"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M7.75 9H12.25M7.75 11.5H12.25M7.75 14H10.5"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.4"
                      stroke-linecap="round"
                    />
                  </svg>
                </span>
              </button>
              <button class="mini-button" data-workspace-mode="settings">Settings</button>
            </div>
          </div>

          <div class="title-cluster">
            <input
              id="song-title"
              class="song-title"
              type="text"
              maxlength="60"
              value=""
              placeholder="Untitled idea"
              aria-label="Song title"
            />
          </div>

          <div class="meta-grid">
            <label class="meta-field">
              <span>Key</span>
              <select id="song-key"></select>
            </label>

            <label class="meta-field">
              <span>Scale</span>
              <select id="song-scale">
                <option value="major">Major</option>
                <option value="minor">Minor</option>
                <option value="dorian">Dorian</option>
                <option value="mixolydian">Mixolydian</option>
              </select>
            </label>

            <div class="meta-field tempo-field">
              <div class="meta-field-head">
                <span>Tempo</span>
                <div class="tempo-stepper">
                  <output id="song-tempo-readout" class="tempo-readout">108 BPM</output>
                </div>
                <button type="button" id="tempo-launch" class="tempo-launch" aria-haspopup="dialog">108 BPM</button>
              </div>
              <input id="song-tempo" class="tempo-slider" type="range" min="50" max="200" step="1" value="108" />
            </div>

          </div>

        </header>

        <main class="workspace">
        <!-- Editor panel: Melody / Lyrics / Studio / Arrangement -->
        <section class="panel editor-panel">
          <div class="panel-head">
            <div class="editor-panel-title">
              <p class="panel-kicker">Editor</p>
              <h2 id="editor-section-title">Verse</h2>
            </div>
            <div class="editor-tempo-control">
              <button
                type="button"
                id="editor-tempo-readout"
                class="editor-tempo-readout"
                aria-haspopup="dialog"
                aria-label="Adjust tempo"
                title="Adjust tempo"
              >
                <svg class="editor-tempo-icon" viewBox="0 0 20 20" fill="none" focusable="false" aria-hidden="true">
                  <path d="M6.2 16.2h7.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M6.8 16.2V7.8c0-.5.18-.98.5-1.35L10 3.3l2.7 3.15c.32.37.5.85.5 1.35v8.4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M8.4 9.1h3.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                  <path d="M12.2 5.85l1.95-1.25" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
              <button
                type="button"
                id="editor-key-scale-launch"
                class="editor-key-scale-readout"
                aria-haspopup="dialog"
                aria-label="Adjust key and scale"
                title="Adjust key and scale"
              >
                <span class="editor-key-scale-glow" aria-hidden="true"></span>
                <span id="editor-key-scale-label" class="editor-key-scale-readout-label">C Maj</span>
              </button>
            </div>
            <button
              class="editor-settings-button mini-button icon-button"
              data-workspace-mode="settings"
              aria-label="Settings"
              title="Settings"
            >
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" focusable="false">
                  <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.4" fill="none"/>
                  <path d="M16.2 12.8l-.9-.5a5.5 5.5 0 000-4.6l.9-.5a1.1 1.1 0 00-1.1-1.9l-.9.5a5.5 5.5 0 00-4-2.3V2.4a1.1 1.1 0 00-2.2 0v1.1a5.5 5.5 0 00-4 2.3l-.9-.5A1.1 1.1 0 002 7.2l.9.5a5.5 5.5 0 000 4.6l-.9.5a1.1 1.1 0 001.1 1.9l.9-.5a5.5 5.5 0 004 2.3v1.1a1.1 1.1 0 002.2 0v-1.1a5.5 5.5 0 004-2.3l.9.5a1.1 1.1 0 001.1-1.9z" stroke="currentColor" stroke-width="1.4" fill="none"/>
                </svg>
              </span>
            </button>
            <button class="melody-tools-toggle mini-button" data-action="toggle-melody-tools" aria-label="Melody tools" title="Melody tools">
              <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" focusable="false">
                <line x1="3" y1="6" x2="17" y2="6"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="14" x2="17" y2="14"/>
                <circle cx="7" cy="6" r="2" fill="var(--bg-1)"/><circle cx="13" cy="10" r="2" fill="var(--bg-1)"/><circle cx="8" cy="14" r="2" fill="var(--bg-1)"/>
              </svg>
              Tools
            </button>
            <div class="tab-strip" role="tablist" aria-label="Editors">
              <button class="tab-button active" data-tab="melody">Melody</button>
              <button class="tab-button" data-tab="lyrics">Lyrics</button>
              <button class="tab-button" data-tab="studio">Studio</button>
              <button class="tab-button" data-tab="arrangement">Arrangement</button>
            </div>
          </div>
          <div id="editor-surface" class="editor-surface"></div>
        </section>

        <!-- Chord Palette: Always visible, tap to add -->
        <section class="panel chord-palette-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Chord Palette</p>
              <h2 id="palette-key-label">C Major</h2>
            </div>
            <div class="palette-head-actions">
              <div id="palette-mode-switch" class="mode-switch embedded"></div>
              <button type="button" id="palette-tempo-launch" class="palette-tempo-launch" aria-haspopup="dialog">108 BPM</button>
              <div id="piano-visualizer" class="piano-visualizer"></div>
            </div>
          </div>
          <div id="chord-player-status" class="chord-player-status hidden"></div>
          <div id="chord-palette" class="chord-palette"></div>
          <div id="borrowed-palette" class="chord-palette borrowed-section"></div>
          <div id="palette-suggestion-row" class="suggestion-row chord-player-suggestion-row hidden"></div>
        </section>

        <div class="workspace-column workspace-column-left">
          <!-- Sections row -->
          <section class="panel section-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">Sections</p>
                <h2 id="active-section-title">Verse</h2>
              </div>
              <button id="add-section-quick" class="mini-button accent">+ Section</button>
            </div>
            <div id="section-list" class="section-list"></div>
          </section>

          <section class="panel arrangement-overview-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">Arrangement View</p>
                <h2>Tracks</h2>
              </div>
            </div>
            <div id="arrangement-overview" class="arrangement-overview"></div>
          </section>
        </div>

        <div class="workspace-column workspace-column-right">
          <!-- Chord Progression -->
          <section class="panel progression-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">Progression</p>
                <h2>Chords</h2>
              </div>
              <div class="inline-actions">
                <button id="add-chord-end" class="mini-button accent">+ Chord</button>
              </div>
            </div>
            <div id="progression-row" class="progression-row" aria-live="polite"></div>
            <div id="chord-inspector" class="chord-inspector" aria-live="polite"></div>
            <div class="suggestion-wrap">
              <p class="subtle-label">Smart suggestions</p>
              <div id="suggestion-row" class="suggestion-row"></div>
            </div>
          </section>
        </div>

        <!-- Chord Arrangement Grid View (iPhone chords tab) -->
        <div id="arrangement-view" class="arrangement-view hidden">
          <div class="arrangement-top-bar">
            <button type="button" class="arr-top-icon-btn" data-action="open-settings" aria-label="Settings">
              <svg viewBox="0 0 20 20" width="18" height="18"><path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M16.2 12.8l-.9-.5a5.5 5.5 0 000-4.6l.9-.5a1.1 1.1 0 00-1.1-1.9l-.9.5a5.5 5.5 0 00-4-2.3V2.4a1.1 1.1 0 00-2.2 0v1.1a5.5 5.5 0 00-4 2.3l-.9-.5A1.1 1.1 0 002 7.2l.9.5a5.5 5.5 0 000 4.6l-.9.5a1.1 1.1 0 001.1 1.9l.9-.5a5.5 5.5 0 004 2.3v1.1a1.1 1.1 0 002.2 0v-1.1a5.5 5.5 0 004-2.3l.9.5a1.1 1.1 0 001.1-1.9z" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
            </button>
            <div class="arr-mode-switch" id="arr-mode-switch">
              <button class="arr-mode-btn active" data-action="set-palette-mode" data-mode="chords">Chords</button>
              <button class="arr-mode-btn" data-action="set-palette-mode" data-mode="drums">Drums</button>
            </div>
            <div class="arr-tempo-control">
              <button type="button" class="arr-tempo-readout" id="arr-tempo-readout" aria-haspopup="dialog" aria-label="Adjust tempo">110 BPM</button>
            </div>
          </div>
          <div id="arrangement-zoom-banner" class="arrangement-zoom-banner hidden" data-action="dismiss-zoom">Reset zoom</div>
          <div id="arrangement-sections" class="arrangement-sections"></div>
          <div class="arrangement-section-actions">
            <button class="arr-section-action-btn arr-section-action-btn--wide" data-action="arrangement-add-section">
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              Section
            </button>
            <button class="arr-section-action-btn arr-section-action-btn--wide" data-action="arrangement-add-line">
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              Line
            </button>
          </div>
        </div>

        <!-- Mode panel (Generator/Export/Settings - shown when selected) -->
        <section class="panel mode-panel" id="mode-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Mode</p>
              <h2 id="mode-title">Compose</h2>
            </div>
          </div>
          <div id="mode-surface" class="mode-surface"></div>
        </section>

        </main>
        <!-- Layout mode (hidden by default, shown in settings) -->
        <span id="browser-pill" class="hidden"></span>
        <span id="layout-status" class="hidden"></span>
        <input id="project-import-input" class="hidden" type="file" accept=".json,application/json" />
      </div>

      <div id="settings-dialog" class="dialog-overlay hidden" aria-hidden="true">
        <section class="dialog-card settings-dialog-card" role="dialog" aria-modal="true" aria-labelledby="settings-dialog-title">
          <div class="panel-head dialog-head">
            <div>
              <p class="panel-kicker">Project Settings</p>
              <h2 id="settings-dialog-title">Settings</h2>
            </div>
            <button class="mini-button" data-settings-dialog-action="close">Close</button>
          </div>
          <div id="settings-dialog-surface" class="dialog-surface"></div>
        </section>
      </div>

      <div id="export-dialog" class="dialog-overlay hidden" aria-hidden="true">
        <section class="dialog-card settings-dialog-card" role="dialog" aria-modal="true" aria-labelledby="export-dialog-title">
          <div class="panel-head dialog-head">
            <div>
              <p class="panel-kicker">Project Files</p>
              <h2 id="export-dialog-title">Export</h2>
            </div>
            <button class="mini-button" data-export-dialog-action="close">Close</button>
          </div>
          <div id="export-dialog-surface" class="dialog-surface"></div>
        </section>
      </div>

      <div id="tempo-dialog" class="dialog-overlay hidden tempo-dialog-overlay" aria-hidden="true">
        <section id="tempo-dialog-card" class="dialog-card tempo-dialog-card" role="dialog" aria-modal="true" aria-labelledby="tempo-dialog-title">
          <div id="tempo-dialog-surface" class="dialog-surface tempo-dialog-surface"></div>
        </section>
      </div>

      <div id="key-scale-dialog" class="dialog-overlay hidden key-scale-dialog-overlay" aria-hidden="true">
        <section id="key-scale-dialog-card" class="dialog-card key-scale-dialog-card" role="dialog" aria-modal="true" aria-labelledby="key-scale-dialog-title">
          <div id="key-scale-dialog-surface" class="dialog-surface key-scale-dialog-surface"></div>
        </section>
      </div>

      <!-- iPhone view tab bar (hidden on iPad/Mac) -->
      <nav class="iphone-view-tabs" aria-label="Views">
        <button class="iphone-view-tab active" data-iphone-view="editor" aria-label="Editor" title="Editor">
          <svg class="iphone-view-tab-icon" viewBox="0 0 20 20" focusable="false">
            <rect x="3" y="4" width="14" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <path d="M3 8h14M7 8v8" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span>Editor</span>
        </button>
        <button class="iphone-view-tab" data-iphone-view="tracks" aria-label="Tracks" title="Tracks">
          <svg class="iphone-view-tab-icon" viewBox="0 0 20 20" fill="none" focusable="false">
            <line x1="4" y1="3" x2="4" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="10" y1="3" x2="10" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="16" y1="3" x2="16" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <rect x="2" y="7" width="4" height="2.5" rx="1.2" fill="currentColor"/>
            <rect x="8" y="12" width="4" height="2.5" rx="1.2" fill="currentColor"/>
            <rect x="14" y="9" width="4" height="2.5" rx="1.2" fill="currentColor"/>
          </svg>
          <span>Tracks</span>
        </button>
        <button class="iphone-view-tab" data-iphone-view="chords" aria-label="Chords" title="Chords">
          <svg class="iphone-view-tab-icon" viewBox="0 0 20 20" focusable="false">
            <rect x="3" y="5" width="5" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <rect x="12" y="3" width="5" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span>Chords</span>
        </button>
      </nav>

      <!-- Fixed bottom transport bar -->
      <div class="bottom-bar">
        <button class="transport-button primary" data-transport="play" aria-label="Play">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path d="M6 4.5L15 10L6 15.5V4.5Z" fill="currentColor" />
            </svg>
          </span>
        </button>
        <button class="transport-button" data-transport="pause" aria-label="Pause">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <rect x="5" y="4.5" width="3.5" height="11" rx="1" fill="currentColor" />
              <rect x="11.5" y="4.5" width="3.5" height="11" rx="1" fill="currentColor" />
            </svg>
          </span>
        </button>
        <button class="transport-button" data-transport="stop" aria-label="Stop">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <rect x="4.5" y="4.5" width="11" height="11" rx="1.75" fill="currentColor" />
            </svg>
          </span>
        </button>
        <button id="loop-toggle" class="transport-button loop-toggle-button" aria-label="Loop">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path
                d="M15.5 6.5V4L18 6.5L15.5 9V6.5H8.25C6.73 6.5 5.5 7.73 5.5 9.25V10"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M4.5 13.5V16L2 13.5L4.5 11V13.5H11.75C13.27 13.5 14.5 12.27 14.5 10.75V10"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </button>
        <button id="undo-button" class="transport-button transport-button--icon" aria-label="Undo" title="Undo">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path
                d="M8 5L4.5 8.5L8 12"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M5 8.5H11.5C14.26 8.5 16.5 10.74 16.5 13.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </button>
        <button id="redo-button" class="transport-button transport-button--icon" aria-label="Redo" title="Redo">
          <span class="transport-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path
                d="M12 5L15.5 8.5L12 12"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M15 8.5H8.5C5.74 8.5 3.5 10.74 3.5 13.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </button>
        <div class="status-pill transport-status">
          <span id="transport-state">Stopped</span>
          <span id="playhead-readout">Bar 1.1</span>
        </div>
      </div>
    </div>

    <script type="module" src="./src/app.js?v=20260314bb"></script>
  </body>
</html>
